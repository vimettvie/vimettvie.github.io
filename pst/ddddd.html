<!DOCTYPE html>
<html lang="uk">
<head>

        main { max-width: 650px; width: 100%; }
        .ttl { color: #fff; font-size: 40px; text-shadow: 0 0 20px rgba(255, 255, 255, 0.5); margin-bottom: 10px; }
        .meta { color: #666; font-size: 14px; margin-bottom: 10px; border-bottom: 2px solid #222; padding-bottom: 10px; }
        article { font-family: 'Courier New', Courier, monospace; white-space: pre; font-size: 18px; line-height: 1; color: #ccc; }
        .glow-link { color: #666; text-decoration: none; font-size: 14px; transition: all 0.6s ease; cursor: pointer; }
        .glow-link:hover { color: #ffffff; text-shadow: 0 0 10px rgba(255, 255, 255, 0.8); letter-spacing: 1px; }
        .footer { margin-top: 60px; color: #444; font-size: 12px; }
    </style>
</head>
<body>
    <main>
        <h1 class="ttl">hi bro</h1>
        <div class="meta">i`m ok • 23.05.2026</div>
        <article>not hhere</article>
        <div class="footer">

        </div>
    </main>

</html>
