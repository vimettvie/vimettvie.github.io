<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 40px; display: flex; justify-content: center; }
        main { max-width: 600px; width: 100%; }
        input, textarea { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 10px; margin-bottom: 10px; box-sizing: border-box; font-family: 'Courier New', monospace; }
        .toolbar { margin-bottom: 5px; }
        .toolbar button { background: #222; color: #fff; border: 1px solid #444; padding: 5px 10px; cursor: pointer; margin-right: 5px; }
        .toolbar button:hover { background: #444; }
        button#postBtn { background: #fff; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; }
        #status { margin-top: 20px; color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <main>
        <input type="text" id="id" placeholder="post id (e.g., 8034)">
        <input type="text" id="title" placeholder="Title">
        <input type="text" id="author" placeholder="Author">
        
        <div class="toolbar">
            <button onclick="wrapText('<b>', '</b>')">B</button>
            <button onclick="wrapText('<i>', '</i>')">I</button>
            <button onclick="wrapText('<code>', '</code>')">Code</button>
            <button onclick="addLink()">Link</button>
            <button onclick="wrapText('<pre class=\'ascii\'>', '</pre>')">ASCII</button>
        </div>
        
        <textarea id="content" rows="15" placeholder="content..."></textarea>
        <button id="postBtn" onclick="sendToServer()">Post</button>
        <div id="status"></div>
    </main>

    <script>
        function wrapText(before, after) {
            const textarea = document.getElementById('content');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const text = textarea.value;
            textarea.value = text.substring(0, start) + before + text.substring(start, end) + after + text.substring(end);
            textarea.focus();
        }

        function addLink() {
            let url = prompt("Enter URL:", "https://");
            if (url) {
                wrapText(`<a href="${url}">`, `</a>`);
            }
        }

        async function sendToServer() {
            const btn = document.getElementById('postBtn');
            const status = document.getElementById('status');
            const data = {
                id: document.getElementById('id').value,
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                content: document.getElementById('content').value
            };
            
            btn.disabled = true;
            status.innerText = "Wait 10-30 sec, we put ur post in us server...";
            
            try {
                const response = await fetch('https://da03-91-231-41-151.ngrok-free.app/create_post', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    let timer = 35;
                    const countdown = setInterval(() => {
                        timer--;
                        status.innerText = `its ok, wait to redirect ${timer} sec...`;
                        if (timer <= 0) {
                            clearInterval(countdown);
                            window.location.href = result.url;
                        }
                    }, 1000);
                } else {
                    btn.disabled = false;
                    status.innerText = "";
                    alert("Error: " + result.message);
                }
            } catch (error) {
                btn.disabled = false;
                status.innerText = "";
                alert("server is down");
            }
        }
    </script>
</body>
</html>
