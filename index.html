<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inhook :: YouTube Downloader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kalnia:wght@400&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000; 
            color: #ffffff;
            font-family: 'Kalnia', serif; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 50px; 
        }

        .title {
            font-size: 48px;
            font-weight: 400; 
            line-height: 1.1;
        }

        .clock {
            font-size: 80px;
            font-weight: 400; 
            line-height: 1;
        }

        /* Зона вводу */
        .input-group {
            display: flex;
            gap: 15px; 
            align-items: stretch;
        }

        input[type="text"] {
            flex-grow: 1; 
            background-color: #1a1a1a; 
            color: #ffffff;
            border: none;
            border-radius: 8px; 
            padding: 15px 20px;
            font-family: inherit; 
            font-size: 18px;
            outline: none;
        }

        input[type="text"]::placeholder {
            color: #4d4d4d; 
            opacity: 1;
        }

        button {
            background-color: #333333; 
            color: #ffffff;
            border: none;
            border-radius: 8px; 
            padding: 15px 30px;
            font-family: inherit;
            font-size: 18px;
            cursor: pointer;
            text-transform: capitalize;
            transition: background-color 0.2s ease;
        }

        button:hover {
            background-color: #444444; 
        }

        button:active {
            background-color: #2a2a2a; 
        }

        #result {
            margin-top: 40px;
            padding: 20px;
            border-radius: 8px;
            background-color: #1a1a1a;
            display: none; 
        }

        #videoTitle {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .download-btn {
            display: inline-block;
            background-color: #ffffff;
            color: #000000;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: bold;
            font-family: inherit;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="title">
                YouTube<br>
                Downloader
            </div>
            <div class="clock">6:24</div>
        </div>

        <div class="input-group">
            <input type="text" id="videoUrl" placeholder="URL" autocomplete="off" spellcheck="false">
            <button onclick="downloadVideo()">Enter</button>
        </div>

        <div id="result">
            <div id="videoTitle">TITLE: UNKNOWN</div>
            <a href="#" id="downloadLink" class="download-btn" target="_blank">Download File</a>
        </div>
    </div>

    <script>
        async function downloadVideo() {
            const urlInput = document.getElementById('videoUrl').value;
            const resultDiv = document.getElementById('result');
            const button = document.querySelector('button');
            if (!urlInput) return;
            button.disabled = true;
            button.innerText = 'Wait';
            resultDiv.style.display = 'none';

            try {
                const response = await fetch(`/api/get_video?url=${encodeURIComponent(urlInput)}`);
                const data = await response.json();

                if (data.status === 'ok') {
                    document.getElementById('videoTitle').innerText = `TITLE: ${data.title}`;
                    document.getElementById('downloadLink').href = data.url;
                    resultDiv.style.display = 'block';
                } else {
                    alert('ERROR: INVALID_LINK');
                }
            } catch (error) {
                alert('CONNECTION_FAILED');
            } finally {
                button.disabled = false;
                button.innerText = 'Enter';
            }
        }
    </script>
</body>
</html>
