<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INH.OOK</title>
    <style>
        body {
            background-color: #000;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            letter-spacing: 1px;
        }

        .main {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .label {
            margin-bottom: 10px;
            font-size: 14px;
            opacity: 0.8;
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #00ff41;
            color: #00ff41;
            font-size: 18px;
            padding: 5px 0;
            outline: none;
            font-family: inherit;
        }

        button {
            background: #00ff41;
            color: #000;
            border: none;
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            text-transform: uppercase;
        }

        button:hover {
            background: #00cc33;
        }

        #status {
            margin-top: 20px;
            font-size: 12px;
            min-height: 20px;
        }

        #result {
            margin-top: 30px;
            display: none;
            border-top: 1px solid #333;
            padding-top: 20px;
        }

        a {
            color: #00ff41;
            text-decoration: underline;
            display: block;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="main">
        <div class="label">> SOURCE_URL</div>
        <input type="text" id="url" placeholder="..." autocomplete="off">
        <button onclick="fetchVideo()">EXECUTE</button>
        
        <div id="status"></div>

        <div id="result">
            <div id="title"></div>
            <a id="link" target="_blank">[ DOWNLOAD_FILE ]</a>
        </div>
    </div>

    <script>
        async function fetchVideo() {
            const url = document.getElementById('url').value;
            const status = document.getElementById('status');
            const result = document.getElementById('result');
            
            if (!url) return;

            status.innerText = 'FETCHING...';
            result.style.display = 'none';

            try {
                const res = await fetch(`/api/get_video?url=${encodeURIComponent(url)}`);
                const data = await res.json();

                if (data.status === 'ok') {
                    status.innerText = 'SUCCESS';
                    document.getElementById('title').innerText = data.title;
                    document.getElementById('link').href = data.url;
                    result.style.display = 'block';
                } else {
                    status.innerText = 'ERROR: INVALID_LINK';
                }
            } catch (e) {
                status.innerText = 'ERROR: SERVER_OFFLINE';
            }
        }
    </script>
</body>
</html>
