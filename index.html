<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inhook</title>
<link href="https://fonts.googleapis.com/css2?family=Kalnia&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#fff;font-family:'Kalnia',serif;height:100vh;display:flex;align-items:center;justify-content:center}
.wrapper{width:100%;max-width:950px;padding:30px}
.header-top{display:flex;justify-content:space-between;margin-bottom:60px;align-items:flex-start}
.logo-txt{font-size:50px;line-height:0.9}
#clk{font-size:80px;line-height:0.8;letter-spacing:-2px}
.input-wrap{display:flex;gap:10px}
#url_in{flex:1;background:#151515;color:#fff;border:none;border-radius:6px;padding:18px 25px;font-family:inherit;font-size:18px;outline:none}
#url_in::placeholder{color:#222}
.go-btn{background:#252525;color:#fff;border:none;border-radius:6px;padding:0 40px;font-family:inherit;font-size:18px;cursor:pointer}
#res_box{margin-top:50px;display:none;background:#111;padding:25px;border-radius:8px}
.dl-btn{display:inline-block;background:#fff;color:#000;text-decoration:none;padding:12px 25px;border-radius:4px;font-weight:bold;margin-top:15px}
</style>
</head>
<body>

<div class="wrapper">
    <div class="header-top">
        <div class="logo-txt">Get-AppXPackage -AllUsers | Foreach {Add-AppxPackage -DisableDevelopmentMode -Register "$($_.InstallLocation)\AppXManifest.xml"}<br> fonttt</div>
</div>
</body>
</html>
