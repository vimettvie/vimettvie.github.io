<!DOCTYPE html>
<html>
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap');
        body { 
            background: transparent; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        #timer { 
            font-family: 'Inter', sans-serif; 
            color: white; 
            font-size: 120px; 
            font-weight: 700;
            font-variant-numeric: tabular-nums; /* Щоб цифри не стрибали */
            text-shadow: 0 4px 20px rgba(0,0,0,0.8);
            /* Можеш додати легкий градієнт тут */
        }
    </style>
</head>
<body>
    <div id="timer">00:00</div>

    <script>
        window.addEventListener('storage', (e) => {
            if (e.key === 'timer_data') {
                const data = JSON.parse(e.newValue);
                document.getElementById('timer').innerText = data.time;
                
                // Можна додати візуальний ефект, якщо на паузі
                document.getElementById('timer').style.opacity = data.isRunning ? "1" : "0.7";
            }
        });
    </script>
</body>
</html>
