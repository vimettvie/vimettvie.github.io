<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для тебе 💜</title>
    <style>
        :root { --primary: #6a1b9a; --accent: #ff4081; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif; background: #fff0f5; }
        #bgCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; touch-action: manipulation; }
        .container { position: relative; width: 90%; max-width: 400px; text-align: center; z-index: 10; }
        .envelope-wrapper { position: relative; cursor: pointer; transition: transform 0.3s ease; }
        .envelope { position: relative; width: 280px; height: 180px; background: #2e7d32; border-radius: 0 0 10px 10px; margin: 0 auto; z-index: 2; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .envelope:before { content: ""; position: absolute; top: 0; left: 0; border-left: 140px solid transparent; border-right: 140px solid transparent; border-top: 110px solid #4caf50; transform-origin: top; transition: 0.4s; }
        .message { display: none; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 25px; border-radius: 25px; box-shadow: 0 15px 35px rgba(106, 27, 154, 0.15); color: #4a148c; animation: slideUp 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(80px) scale(0.8); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .heart-button { display: none; background: linear-gradient(45deg, #ff4081, #ec407a); color: white; border: none; padding: 18px 35px; border-radius: 50px; font-size: 20px; font-weight: bold; margin: 25px auto; box-shadow: 0 8px 20px rgba(255, 64, 129, 0.3); cursor: pointer; }
        #counter { font-size: 26px; display: block; margin-top: 5px; }
        .active .envelope-wrapper { display: none; }
        .active .message, .active .heart-button { display: block; }
        .hint { margin-top: 25px; color: #1b5e20; font-weight: bold; font-size: 18px; animation: bounce 1.5s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    </style>
</head>
<body onclick="initAudio()"> <!-- Додав ініціалізацію на перший клік -->

<audio id="bgMusic" loop playsinline preload="auto">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<canvas id="bgCanvas"></canvas>

<div class="container" id="mainContainer">
    <div class="envelope-wrapper" onclick="openEnvelope()">
        <div class="envelope"></div>
        <div class="hint">жмякни щоб відкрити</div>
    </div>

    <div class="message">
        <strong>Привіт сонечко</strong><br><br>
        Навіть не віриться що пройшло вже цілих 6 місяців. За цей час я встиг посправжньому сильно полюбити тебе. Я люблю твою неймовірну красу твою чесність та твій характер який є тільки в тобі 🥰<br><br>
        Ти моя найближча людина. Дякую тобі за те що ти така яка ти є.<br>
        <div id="timer" style="font-weight: bold; margin-top: 15px; font-size: 16px; color: #6a1b9a;"></div>
    </div>

    <button class="heart-button" onclick="sendHeart()">
        💜
        <span id="counter">0</span>
    </button>
</div>

<script>
    let heartCount = 0;
    const startDate = new Date(2025, 10, 15); 
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    const audio = document.getElementById('bgMusic');
    let hearts = [];
    let audioStarted = false;

    function initAudio() {
        if (!audioStarted) {
            audio.play().then(() => {
                audio.pause(); 
                audioStarted = true;
            }).catch(e => console.log("Safari ще чекає"));
        }
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function drawHeart(x, y, size, color, opacity) {
        ctx.save(); ctx.beginPath(); ctx.translate(x, y); ctx.scale(size, size);
        ctx.moveTo(0, 0); ctx.bezierCurveTo(-5, -5, -10, 5, 0, 12); ctx.bezierCurveTo(10, 5, 5, -5, 0, 0);
        ctx.fillStyle = color; ctx.globalAlpha = opacity; ctx.fill(); ctx.restore();
    }

    class Heart {
        constructor(isUserGenerated = false) { this.isUserGenerated = isUserGenerated; this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = this.isUserGenerated ? (window.innerHeight / 2 + 50) : (canvas.height + Math.random() * 200);
            this.size = Math.random() * 1.8 + 0.6;
            this.speed = this.isUserGenerated ? (Math.random() * 4 + 3) : (Math.random() * 1.5 + 0.8);
            this.opacity = Math.random() * 0.6 + 0.3;
            this.color = ['#ff80ab', '#ff4081', '#f48fb1', '#ce93d8', '#ba68c8'][Math.floor(Math.random() * 5)];
            this.amplitude = Math.random() * 2 + 1;
            this.offset = Math.random() * 100;
        }
        update() {
            this.y -= this.speed;
            this.x += Math.sin((this.y + this.offset) / 50) * this.amplitude;
            if (this.y < -50) { if (this.isUserGenerated) return false; this.reset(); }
            return true;
        }
        draw() { drawHeart(this.x, this.y, this.size, this.color, this.opacity); }
    }

    for (let i = 0; i < 50; i++) hearts.push(new Heart(false));

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        hearts = hearts.filter(h => {
            const active = h.update();
            if (active) h.draw();
            return active;
        });
        while (hearts.filter(h => !h.isUserGenerated).length < 50) hearts.push(new Heart(false));
        requestAnimationFrame(animate);
    }
    animate();

    function openEnvelope() {
        document.getElementById('mainContainer').classList.add('active');
        audio.currentTime = 0;
        audio.play();
        updateTimer();
        setInterval(updateTimer, 60000); 
    }

    function sendHeart() {
        heartCount++;
        document.getElementById('counter').innerText = heartCount;
        for(let i=0; i<8; i++) {
             const h = new Heart(true);
             h.x = window.innerWidth / 2 + (Math.random() - 0.5) * 60;
             hearts.push(h);
        }
    }

    function updateTimer() {
        const now = new Date();
        const diff = now - startDate;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        document.getElementById('timer').innerText = `Ми разом уже: ${days} днів та ${hours} годин 💜`;
    }
</script>

</body>
</html>
